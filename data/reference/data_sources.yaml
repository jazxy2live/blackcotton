# melA Tyrosinase (Streptomyces antibioticus)
# STATUS: ✅ REAL — downloaded from NCBI
melA:
  accession: "M11582.1"
  organism: "Streptomyces antibioticus"
  database: "NCBI GenBank"
  url: "https://www.ncbi.nlm.nih.gov/nuccore/M11582"
  CDS_range: "331..1278"  # melC2 tyrosinase coding sequence within the locus
  protein_length_aa: 315
  notes: >
    Full locus includes upstream ORF (melC1, copper chaperone) and melC2
    (tyrosinase). For our construct we need the melC2 CDS (331-1278).
    Consider also including melC1 as it assists copper loading into tyrosinase.
    Local resolver now validates CDS structure and falls back to ORF extraction
    from GenBank if melC2_CDS_real.fasta is malformed.

