expression_data:
  database: "NCBI GEO / SRA"
  url: "https://www.ncbi.nlm.nih.gov/geo/"
  key_datasets:
    - description: "90 RNA-seq libraries, 10 DPA timepoints, 3 cultivars"
      timepoints: [-3, -1, 0, 1, 3, 5, 10, 15, 20, 25]
      cultivars: ["TM-1", "Hai7124", "3-79"]
    - description: "380+ RNA-seq datasets remapped, 18 tissues, 34 cultivars"
      source: "Frontiers in Plant Science"
    - description: "7-timepoint mutant vs wild-type fiber development"
      source: "MDPI"
  how_to_use: >
    Download FPKM/TPM values for CesA4/7/8 genes across DPA timepoints.
    These give REAL promoter activity curves that we can fit our Hill
    functions to, instead of guessing activation/peak DPA values.

