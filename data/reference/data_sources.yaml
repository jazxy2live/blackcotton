# ── PROMOTER SEQUENCES ──────────────────────────────────────────

# STATUS: 🔴 NEED TO EXTRACT FROM COTTON GENOME
promoters:
  database: "CottonGen"
  url: "https://www.cottongen.org/"
  genome: "Gossypium hirsutum TM-1 reference genome v2.1"
  strategy: >
    1. Go to CottonGen JBrowse genome browser
    2. Search for known maturation-expressed genes:
       - GhCesA4 (Gh_A05G1046) — cellulose synthase, peak at 25-35 DPA
       - GhCesA7 (Gh_D11G1572) — similar timing
       - GhCesA8 (Gh_A13G0433) — late SCW
       - GhMYBL1 — SCW transcription factor
       - GhBG1 (beta-glucosidase) — maturation marker
    3. Extract 1.5-2 kb upstream of each gene's start codon
    4. Those upstream regions ARE the promoters
    5. Test in our model by fitting expression data from RNA-seq

# ── ENZYME KINETICS ─────────────────────────────────────────────

# STATUS: 🟡 CAN BE IMPROVED
enzyme_kinetics:
  database: "BRENDA"
  url: "https://www.brenda-enzymes.org/"
  tyrosinase:
    EC: "1.14.18.1"
    published_Km_L_tyrosine:
      - value_mM: 0.70
        organism: "B16/C3 murine melanoma"
        reference: "PMID:6415982"
      - value_mM: 0.676
        organism: "Agaricus bisporus (mushroom)"
        reference: "Scribd literature"
      - value_mM: 0.465
        organism: "microencapsulated mushroom"
        reference: "Tandfonline"
    published_Km_L_DOPA:
      - value_mM: 0.60
        organism: "B16/C3 murine melanoma"
        reference: "PMID:6415982"
      - value_mM: 0.66
        organism: "Agaricus bisporus"
        reference: "ResearchGate"
      - value_mM: 0.87
        organism: "Agaricus bisporus"
        reference: "NISCPR"
    our_value_mM: 0.18
    verdict: "Our Km is lower than most published values — should increase to ~0.5-0.7 mM"
  DCT:
    EC: "5.3.3.12"
  TYRP1:
    EC: "1.14.18.1"
    notes: "Shares EC number with tyrosinase but has distinct DHICA oxidase activity"

