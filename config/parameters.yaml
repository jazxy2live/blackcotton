# ============================================================================
# BlackCotton - Biological Parameters Configuration
# ============================================================================
# All parameters are sourced from published literature on cotton fiber
# development and melanin biosynthesis.

# ---- Cotton Fiber Development Timeline ----
fiber_development:
  # Days Post Anthesis (DPA) stage boundaries
  initiation_start: 0
  initiation_end: 3
  elongation_start: 3
  elongation_end: 21
  scw_synthesis_start: 16      # Secondary Cell Wall synthesis
  scw_synthesis_end: 40
  maturation_start: 35
  maturation_end: 50
  total_development_days: 50

  # Fiber physical parameters (target for Coker-312 cultivar)
  target_length_mm: 30.0       # UHML (Upper Half Mean Length)
  target_strength_g_tex: 30.0  # Bundle strength
  target_micronaire: 4.2       # Fineness/maturity
  target_uniformity: 83.0      # Length uniformity ratio (%)

# ---- Cellulose Deposition Kinetics ----
cellulose:
  max_synthesis_rate: 0.15     # mg/fiber/day at peak
  peak_dpa: 28                 # DPA of maximum cellulose synthesis
  total_cellulose_per_fiber: 3.5  # mg at maturity
  crystallinity_index: 0.70    # Target CI for spinnable fiber
  # Hill equation parameters for cellulose accumulation
  hill_coefficient: 4.0
  half_max_dpa: 25.0

# ---- Promoter Parameters ----
promoters:
  pGhMat1:
    description: "Maturation-specific promoter from G. hirsutum"
    activation_dpa: 40         # DPA when promoter becomes active (timing-safe default)
    peak_dpa: 45               # DPA of peak expression
    strength_relative: 1.0     # Relative to constitutive (35S = 1.0)
    hill_coefficient: 8.0      # Sharpness of activation switch
    leakage_fraction: 0.01     # Fraction of max expression before activation

  pGhSCW_late:
    description: "Late secondary cell wall promoter"
    activation_dpa: 32
    peak_dpa: 38
    strength_relative: 1.0
    hill_coefficient: 6.0
    leakage_fraction: 0.02

  p35S:
    description: "CaMV 35S constitutive promoter (for selection marker)"
    activation_dpa: 0
    peak_dpa: 0                # Constitutive - always on
    strength_relative: 1.0
    hill_coefficient: 1.0
    leakage_fraction: 1.0      # Always fully active

# ---- Melanin Biosynthesis Pathway ----
melanin_pathway:
  # Enzyme kinetic parameters (Michaelis-Menten)
  tyrosinase_melA:
    Km_tyrosine: 0.65          # mM — BRENDA/literature: 0.47-0.70 mM range
    Vmax: 2.5                  # µmol/min/mg enzyme
    kcat: 150.0                # s^-1 (turnover number)
    description: "Streptomyces antibioticus tyrosinase (NCBI M11582)"
    molecular_weight_kDa: 30.9

  TYRP1:
    Km_dopaquinone: 0.25       # mM
    Vmax: 1.8                  # µmol/min/mg enzyme
    kcat: 95.0                 # s^-1
    description: "Tyrosinase-related protein 1"

  DCT:
    Km_dopachrome: 0.30        # mM
    Vmax: 1.2                  # µmol/min/mg enzyme
    kcat: 80.0                 # s^-1
    description: "Dopachrome tautomerase"

  # Substrate concentrations in cotton fiber
  initial_tyrosine_mM: 0.5     # Estimated free L-Tyr in fiber cells
  melanin_target_mg_per_fiber: 0.08  # Target melanin mass per fiber

  # Spontaneous reaction rates
  dopaquinone_cyclization_rate: 0.5   # s^-1 (non-enzymatic)
  indole_polymerization_rate: 0.01    # s^-1 (melanin formation)

# ---- Failure-Risk Controls (fail-first robustness modeling) ----
failure_risks:
  # Fraction of tyrosinase that is copper-loaded and catalytically competent.
  copper_loading_fraction: 0.92
  # Activation/maturation fraction of tyrosinase (e.g., caddie/chaperone effects).
  tyrosinase_activation_fraction: 0.90
  # Pre-cellulose quinone/toxic intermediate ceiling (arbitrary model units).
  quinone_stress_threshold: 0.080
  # Higher values buffer oxidative stress and reduce early-toxicity penalties.
  ros_buffer_capacity: 0.85
  # Probability-like burden for transgene silencing across events.
  silencing_probability: 0.06
  # Cross-event expression variability (coarse lab-to-lab instability proxy).
  event_expression_cv: 0.12

# ---- Codon Usage ----
codon_optimization:
  target_organism: "Gossypium hirsutum"
  # Codon frequencies from Kazusa DB (species 3635)
  # GC content from real Kazusa data
  target_gc_content: 0.43
  avoid_restriction_sites:
    - "GGTCTC"  # BsaI
    - "CGTCTC"  # BsmBI
    - "GAAGAC"  # BbsI
    - "GAATTC"  # EcoRI
    - "GGATCC"  # BamHI

# ---- Genetic Construct Architecture ----
construct:
  backbone: "pCAMBIA2300"
  selectable_marker: "nptII"
  selection_agent: "Kanamycin"
  selection_concentration_mg_L: 50
  agrobacterium_strain: "LBA4404"

  # T-DNA cassette order (5' to 3', LB to RB)
  cassettes:
    - name: "melanin_primary"
      promoter: "pGhMat1"
      gene: "melA"
      terminator: "tNOS"
    - name: "tyrp1_support"
      promoter: "pGhSCW_late"
      gene: "GhTYRP1"
      terminator: "tNOS"
    - name: "dct_support"
      promoter: "pGhSCW_late"
      gene: "GhDCT"
      terminator: "tNOS"
    - name: "selection"
      promoter: "p35S"
      gene: "nptII"
      terminator: "tNOS"

# ---- Transformation Parameters ----
transformation:
  cultivar: "Coker-312"
  explant: "hypocotyl"
  co_cultivation_temp_C: 19
  co_cultivation_hours: 48
  acetosyringone_mg_L: 50
  regeneration_days: 85       # Expected timeline
  expected_efficiency: 0.03   # 3% transformation rate

# ---- Simulation Parameters ----
simulation:
  time_resolution_hours: 1    # Simulation timestep
  num_fibers_simulated: 1000  # Monte Carlo fiber population
  noise_fraction: 0.1         # Biological noise (CV)
  random_seed: 42
